<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Streak Milestone Tracker</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    margin: 0;
    padding: 24px 16px;
    background: #ffffff;
    display: flex;
    justify-content: center;
  }
  .card {
    width: 100%;
    max-width: 480px;
    border: 1px solid #d1d5db;
    border-radius: 12px;
    padding: 28px 24px;
    background: #ffffff;
  }
  .eyebrow {
    color: #16a34a;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin: 0 0 6px 0;
  }
  h1 {
    font-size: 22px;
    font-weight: 700;
    color: #111827;
    margin: 0 0 8px 0;
  }
  .subtitle {
    font-size: 14px;
    color: #4b5563;
    line-height: 1.5;
    margin: 0 0 22px 0;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #111827;
    margin-bottom: 6px;
    margin-top: 16px;
  }
  input[type="number"], input[type="text"] {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 14px;
    color: #111827;
  }
  input:focus {
    outline: none;
    border-color: #16a34a;
    box-shadow: 0 0 0 3px rgba(22,163,74,0.15);
  }
  .result {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid #e5e7eb;
    display: none;
  }
  .result.visible { display: block; }
  .badge-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .badge-name {
    font-size: 16px;
    font-weight: 700;
    color: #111827;
  }
  .badge-icon { font-size: 20px; }
  .progress-track {
    width: 100%;
    height: 10px;
    background: #e5e7eb;
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #16a34a;
    border-radius: 999px;
    transition: width 0.4s ease;
    width: 0%;
  }
  .progress-caption {
    font-size: 13px;
    color: #4b5563;
    margin-top: 8px;
  }
  .milestone-note {
    font-size: 13px;
    color: #374151;
    background: #f0fdf4;
    border: 1px solid #bbf7d0;
    border-radius: 8px;
    padding: 12px 14px;
    margin-top: 16px;
    line-height: 1.5;
  }
  button {
    width: 100%;
    margin-top: 20px;
    padding: 13px;
    background: #16a34a;
    color: #ffffff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: #128a3e; }
</style>
</head>
<body>

<div class="card">
  <p class="eyebrow">Plant Powered Performance World</p>
  <h1>Streak Milestone Tracker</h1>
  <p class="subtitle">Enter your current streak to see your badge, your progress toward the next milestone, and exactly how many days are left.</p>

  <label for="habitName">Habit (optional)</label>
  <input type="text" id="habitName" placeholder="e.g. Morning run">

  <label for="streakDays">Current streak (days)</label>
  <input type="number" id="streakDays" min="0" placeholder="e.g. 12">

  <button onclick="calculateStreak()">Show My Progress</button>

  <div class="result" id="result">
    <div class="badge-row">
      <span class="badge-name" id="badgeName"></span>
      <span class="badge-icon" id="badgeIcon"></span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <p class="progress-caption" id="progressCaption"></p>
    <div class="milestone-note" id="milestoneNote"></div>
  </div>
</div>

<script>
  const milestones = [
    { days: 7,   name: "Spark",          icon: "🔥", note: "The habit is no longer a decision." },
    { days: 14,  name: "Momentum",       icon: "💪", note: "You'd notice if you skipped." },
    { days: 30,  name: "Foundation",     icon: "⭐", note: "This is where habits start to automate." },
    { days: 60,  name: "Compound",       icon: "🚀", note: "You're now outperforming most people who tried and quit." },
    { days: 100, name: "Identity Shift", icon: "👑", note: "This isn't something you do anymore, it's who you are." },
    { days: 365, name: "Mastery",        icon: "🏅", note: "You've built something most people never will." }
  ];

  function calculateStreak() {
    const streakInput = document.getElementById('streakDays').value;
    const streak = parseInt(streakInput, 10);
    const result = document.getElementById('result');

    if (isNaN(streak) || streak < 0) {
      result.classList.remove('visible');
      return;
    }

    let currentBadge = null;
    let nextMilestone = milestones[0];

    for (let i = 0; i < milestones.length; i++) {
      if (streak >= milestones[i].days) {
        currentBadge = milestones[i];
        nextMilestone = milestones[i + 1] || null;
      } else {
        nextMilestone = milestones[i];
        break;
      }
    }

    const badgeName = document.getElementById('badgeName');
    const badgeIcon = document.getElementById('badgeIcon');
    const progressFill = document.getElementById('progressFill');
    const progressCaption = document.getElementById('progressCaption');
    const milestoneNote = document.getElementById('milestoneNote');

    if (!nextMilestone) {
      // Beyond the final milestone
      badgeName.textContent = currentBadge.name;
      badgeIcon.textContent = currentBadge.icon;
      progressFill.style.width = "100%";
      progressCaption.textContent = "You've hit every milestone. Keep the chain going.";
      milestoneNote.textContent = currentBadge.note;
    } else {
      const prevDays = currentBadge ? currentBadge.days : 0;
      const rangeSize = nextMilestone.days - prevDays;
      const progressInRange = streak - prevDays;
      const percent = Math.min(100, Math.round((progressInRange / rangeSize) * 100));
      const daysLeft = nextMilestone.days - streak;

      badgeName.textContent = currentBadge ? currentBadge.name : "Building";
      badgeIcon.textContent = currentBadge ? currentBadge.icon : "🌱";
      progressFill.style.width = percent + "%";
      progressCaption.textContent = daysLeft + " day" + (daysLeft === 1 ? "" : "s") + " until \"" + nextMilestone.name + "\" (" + nextMilestone.days + " days)";
      milestoneNote.textContent = currentBadge ? currentBadge.note : "Every streak starts with day one. Keep showing up.";
    }

    result.classList.add('visible');
  }
</script>

</body>
</html>
