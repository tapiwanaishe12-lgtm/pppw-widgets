<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Rotation</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    margin: 0;
    padding: 24px 16px;
    background: #ffffff;
    display: flex;
    justify-content: center;
  }
  .card {
    width: 100%;
    max-width: 480px;
    border: 1px solid #d1d5db;
    border-radius: 12px;
    padding: 28px 24px;
    background: #ffffff;
  }
  .eyebrow {
    color: #16a34a;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin: 0 0 6px 0;
  }
  h1 {
    font-size: 22px;
    font-weight: 700;
    color: #111827;
    margin: 0 0 8px 0;
  }
  .subtitle {
    font-size: 14px;
    color: #4b5563;
    line-height: 1.5;
    margin: 0 0 20px 0;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #111827;
    margin-bottom: 8px;
    margin-top: 16px;
  }

  .category-row {
    display: flex;
    gap: 8px;
  }
  .category-btn {
    flex: 1;
    padding: 9px 6px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    background: #ffffff;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    color: #111827;
  }
  .category-btn:hover { border-color: #16a34a; }
  .category-btn.selected {
    border-color: #16a34a;
    background: #f0fdf4;
    color: #16a34a;
  }

  .add-row {
    display: flex;
    gap: 8px;
  }
  input[type="text"] {
    flex: 1;
    padding: 10px 12px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 14px;
    color: #111827;
  }
  input:focus {
    outline: none;
    border-color: #16a34a;
    box-shadow: 0 0 0 3px rgba(22,163,74,0.15);
  }
  .add-btn {
    padding: 10px 16px;
    background: #16a34a;
    color: #ffffff;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .add-btn:hover { background: #128a3e; }

  .recipe-list { margin-top: 16px; }
  .recipe-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid #f3f4f6;
    font-size: 13px;
    color: #111827;
  }
  .recipe-item:last-child { border-bottom: none; }
  .recipe-item span { flex: 1; }
  .recipe-category-tag {
    font-size: 10px;
    font-weight: 700;
    color: #16a34a;
    text-transform: uppercase;
  }
  .remove-recipe {
    background: none;
    border: none;
    color: #9ca3af;
    cursor: pointer;
    font-size: 14px;
  }
  .remove-recipe:hover { color: #b91c1c; }
  .empty-note {
    font-size: 13px;
    color: #9ca3af;
  }

  button.spin-btn {
    width: 100%;
    margin-top: 20px;
    padding: 13px;
    background: #16a34a;
    color: #ffffff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  button.spin-btn:hover { background: #128a3e; }

  .result {
    margin-top: 20px;
    padding: 20px;
    background: #f0fdf4;
    border: 1px solid #bbf7d0;
    border-radius: 10px;
    display: none;
    text-align: center;
  }
  .result.visible { display: block; }
  .result-name {
    font-size: 18px;
    font-weight: 700;
    color: #111827;
  }
</style>
</head>
<body>

<div class="card">
  <p class="eyebrow">Plant Powered Performance World</p>
  <h1>Recipe Rotation</h1>
  <p class="subtitle">Add your saved recipes, filter by category if you like, and let the picker decide.</p>

  <label for="recipeInput">Add a recipe from your Vault</label>
  <div class="add-row">
    <input type="text" id="recipeInput" placeholder="e.g. Chickpea & Quinoa Bowl" onkeypress="if(event.key==='Enter') addRecipe()">
    <button class="add-btn" onclick="addRecipe()">Add</button>
  </div>

  <label>Category</label>
  <div class="category-row" id="categoryRow">
    <div class="category-btn selected" data-category="Breakfast">Breakfast</div>
    <div class="category-btn" data-category="Lunch">Lunch</div>
    <div class="category-btn" data-category="Dinner">Dinner</div>
    <div class="category-btn" data-category="Snack">Snack</div>
  </div>

  <div class="recipe-list" id="recipeList"></div>

  <button class="spin-btn" onclick="pickRandom()">Pick For Me</button>

  <div class="result" id="result">
    <p class="result-name" id="resultName"></p>
  </div>
</div>

<script>
  let recipes = [
    { name: 'Chickpea & Quinoa Bowl', category: 'Lunch' },
    { name: 'Tofu Scramble', category: 'Breakfast' },
    { name: 'Tempeh Stir-Fry', category: 'Dinner' }
  ];
  let selectedCategory = 'Breakfast';

  document.querySelectorAll('.category-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedCategory = btn.getAttribute('data-category');
    });
  });

  function addRecipe() {
    const input = document.getElementById('recipeInput');
    const name = input.value.trim();
    if (!name) return;

    recipes.push({ name, category: selectedCategory });
    input.value = '';
    renderRecipes();
  }

  function removeRecipe(index) {
    recipes.splice(index, 1);
    renderRecipes();
  }

  function renderRecipes() {
    const list = document.getElementById('recipeList');
    list.innerHTML = '';

    if (recipes.length === 0) {
      list.innerHTML = '<p class="empty-note">No recipes added yet. Add a few from your Recipe Vault above.</p>';
      return;
    }

    recipes.forEach((r, i) => {
      const div = document.createElement('div');
      div.className = 'recipe-item';
      div.innerHTML = '<span class="recipe-category-tag">' + r.category + '</span><span>' + r.name + '</span><button class="remove-recipe" onclick="removeRecipe(' + i + ')">✕</button>';
      list.appendChild(div);
    });
  }

  function pickRandom() {
    const filtered = recipes.filter(r => r.category === selectedCategory);
    const result = document.getElementById('result');

    if (filtered.length === 0) {
      document.getElementById('resultName').textContent = "No " + selectedCategory.toLowerCase() + " recipes added yet — add a few above first.";
      result.classList.add('visible');
      return;
    }

    const pick = filtered[Math.floor(Math.random() * filtered.length)];
    document.getElementById('resultName').textContent = "🍽️ " + pick.name;
    result.classList.add('visible');
  }

  renderRecipes();
</script>

</body>
</html>
