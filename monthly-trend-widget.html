<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monthly Trend Comparison</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    margin: 0;
    padding: 24px 16px;
    background: #ffffff;
    display: flex;
    justify-content: center;
  }
  .card {
    width: 100%;
    max-width: 560px;
    border: 1px solid #d1d5db;
    border-radius: 12px;
    padding: 28px 24px;
    background: #ffffff;
  }
  .eyebrow {
    color: #16a34a;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin: 0 0 6px 0;
  }
  h1 {
    font-size: 22px;
    font-weight: 700;
    color: #111827;
    margin: 0 0 8px 0;
  }
  .subtitle {
    font-size: 14px;
    color: #4b5563;
    line-height: 1.5;
    margin: 0 0 20px 0;
  }
  .section-label {
    font-size: 12px;
    font-weight: 700;
    color: #16a34a;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin: 20px 0 10px 0;
  }
  .section-label.first { margin-top: 0; }

  .input-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #111827;
    margin-bottom: 6px;
  }
  input[type="number"] {
    width: 100%;
    padding: 9px 10px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 13px;
    color: #111827;
  }
  input:focus {
    outline: none;
    border-color: #16a34a;
    box-shadow: 0 0 0 3px rgba(22,163,74,0.15);
  }

  button.compare-btn {
    width: 100%;
    margin-top: 20px;
    padding: 13px;
    background: #16a34a;
    color: #ffffff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  button.compare-btn:hover { background: #128a3e; }

  .result {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid #e5e7eb;
    display: none;
  }
  .result.visible { display: block; }
  .metric-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid #f3f4f6;
  }
  .metric-row:last-child { border-bottom: none; }
  .metric-name {
    font-size: 13px;
    font-weight: 600;
    color: #111827;
    flex: 1;
  }
  .metric-values {
    font-size: 13px;
    color: #6b7280;
    text-align: right;
  }
  .metric-delta {
    font-size: 13px;
    font-weight: 700;
    min-width: 60px;
    text-align: right;
  }
  .delta-up { color: #16a34a; }
  .delta-down { color: #dc2626; }
  .delta-flat { color: #6b7280; }
</style>
</head>
<body>

<div class="card">
  <p class="eyebrow">Plant Powered Performance World</p>
  <h1>Monthly Trend Comparison</h1>
  <p class="subtitle">Enter last month's and this month's numbers to see what's genuinely moving.</p>

  <p class="section-label first">Last Month</p>
  <div class="input-grid">
    <div><label>Avg Weight (kg)</label><input type="number" id="lastWeight" step="0.1"></div>
    <div><label>Consistency %</label><input type="number" id="lastConsistency" min="0" max="100"></div>
    <div><label>Avg Daily Steps</label><input type="number" id="lastSteps" min="0"></div>
    <div><label>Avg Sleep Hours</label><input type="number" id="lastSleep" step="0.1"></div>
  </div>

  <p class="section-label">This Month</p>
  <div class="input-grid">
    <div><label>Avg Weight (kg)</label><input type="number" id="thisWeight" step="0.1"></div>
    <div><label>Consistency %</label><input type="number" id="thisConsistency" min="0" max="100"></div>
    <div><label>Avg Daily Steps</label><input type="number" id="thisSteps" min="0"></div>
    <div><label>Avg Sleep Hours</label><input type="number" id="thisSleep" step="0.1"></div>
  </div>

  <button class="compare-btn" onclick="compareMonths()">Compare My Months</button>

  <div class="result" id="result">
    <div id="metricsList"></div>
  </div>
</div>

<script>
  function compareMonths() {
    const metrics = [
      { name: 'Avg Weight', last: 'lastWeight', current: 'thisWeight', unit: 'kg', lowerIsBetter: true },
      { name: 'Consistency', last: 'lastConsistency', current: 'thisConsistency', unit: '%', lowerIsBetter: false },
      { name: 'Avg Daily Steps', last: 'lastSteps', current: 'thisSteps', unit: '', lowerIsBetter: false },
      { name: 'Avg Sleep', last: 'lastSleep', current: 'thisSleep', unit: 'h', lowerIsBetter: false }
    ];

    const metricsList = document.getElementById('metricsList');
    metricsList.innerHTML = '';

    metrics.forEach(m => {
      const lastVal = parseFloat(document.getElementById(m.last).value);
      const currentVal = parseFloat(document.getElementById(m.current).value);

      if (isNaN(lastVal) || isNaN(currentVal)) return;

      const delta = Math.round((currentVal - lastVal) * 10) / 10;
      let deltaClass = 'delta-flat';
      let deltaSymbol = '→ 0';

      if (delta > 0) {
        deltaSymbol = '↑ +' + delta + m.unit;
        deltaClass = m.lowerIsBetter ? 'delta-down' : 'delta-up';
      } else if (delta < 0) {
        deltaSymbol = '↓ ' + delta + m.unit;
        deltaClass = m.lowerIsBetter ? 'delta-up' : 'delta-down';
      }

      const row = document.createElement('div');
      row.className = 'metric-row';
      row.innerHTML = '<span class="metric-name">' + m.name + '</span>' +
        '<span class="metric-values">' + lastVal + m.unit + ' → ' + currentVal + m.unit + '</span>' +
        '<span class="metric-delta ' + deltaClass + '">' + deltaSymbol + '</span>';
      metricsList.appendChild(row);
    });

    document.getElementById('result').classList.add('visible');
  }
</script>

</body>
</html>
