<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Energy & Performance Correlation</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    margin: 0;
    padding: 24px 16px;
    background: #ffffff;
    display: flex;
    justify-content: center;
  }
  .card {
    width: 100%;
    max-width: 560px;
    border: 1px solid #d1d5db;
    border-radius: 12px;
    padding: 28px 24px;
    background: #ffffff;
  }
  .eyebrow {
    color: #16a34a;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin: 0 0 6px 0;
  }
  h1 {
    font-size: 22px;
    font-weight: 700;
    color: #111827;
    margin: 0 0 8px 0;
  }
  .subtitle {
    font-size: 14px;
    color: #4b5563;
    line-height: 1.5;
    margin: 0 0 20px 0;
  }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #111827;
    margin-bottom: 6px;
    margin-top: 14px;
  }
  input[type="text"], input[type="number"] {
    width: 100%;
    padding: 9px 10px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 13px;
    color: #111827;
  }
  input:focus {
    outline: none;
    border-color: #16a34a;
    box-shadow: 0 0 0 3px rgba(22,163,74,0.15);
  }

  .entry-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    align-items: flex-end;
  }
  .entry-row .meal-input { flex: 2; }
  .entry-row .num-input { flex: 1; }
  .remove-entry {
    background: none;
    border: none;
    color: #9ca3af;
    font-size: 18px;
    cursor: pointer;
    padding: 0 6px 8px 6px;
  }
  .remove-entry:hover { color: #b91c1c; }

  .add-entry-btn {
    margin-top: 12px;
    padding: 9px 14px;
    background: #ffffff;
    color: #16a34a;
    border: 1px solid #16a34a;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .add-entry-btn:hover { background: #f0fdf4; }

  button.analyze-btn {
    width: 100%;
    margin-top: 20px;
    padding: 13px;
    background: #16a34a;
    color: #ffffff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  button.analyze-btn:hover { background: #128a3e; }

  .result {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid #e5e7eb;
    display: none;
  }
  .result.visible { display: block; }
  .message {
    font-size: 13px;
    color: #374151;
    background: #f0fdf4;
    border: 1px solid #bbf7d0;
    border-radius: 8px;
    padding: 14px;
    line-height: 1.6;
  }
  .stat-row {
    display: flex;
    gap: 10px;
    margin-top: 14px;
  }
  .stat-box {
    flex: 1;
    text-align: center;
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    padding: 10px 6px;
  }
  .stat-value {
    font-size: 18px;
    font-weight: 700;
    color: #16a34a;
  }
  .stat-label {
    font-size: 10px;
    color: #6b7280;
    margin-top: 2px;
  }
  .column-labels {
    display: flex;
    gap: 8px;
    margin-top: 16px;
  }
  .column-labels .meal-input { flex: 2; font-size: 11px; color: #6b7280; font-weight: 600; }
  .column-labels .num-input { flex: 1; font-size: 11px; color: #6b7280; font-weight: 600; text-align: center; }
</style>
</head>
<body>

<div class="card">
  <p class="eyebrow">Plant Powered Performance World</p>
  <h1>Energy & Performance Correlation</h1>
  <p class="subtitle">Add a few recent entries from your Energy Log to spot whether a pattern is actually there.</p>

  <div class="column-labels">
    <span class="meal-input">Pre-training meal</span>
    <span class="num-input">Energy</span>
    <span class="num-input">Performance</span>
  </div>

  <div id="entriesContainer"></div>
  <button class="add-entry-btn" onclick="addEntry()">+ Add Entry</button>

  <button class="analyze-btn" onclick="analyzeEntries()">Find the Pattern</button>

  <div class="result" id="result">
    <div class="message" id="message"></div>
    <div class="stat-row" id="statRow"></div>
  </div>
</div>

<script>
  let entryCount = 0;

  function addEntry(meal, energy, performance) {
    entryCount++;
    const container = document.getElementById('entriesContainer');
    const row = document.createElement('div');
    row.className = 'entry-row';
    row.setAttribute('data-entry-id', entryCount);
    row.innerHTML = `
      <input type="text" class="meal-input" placeholder="e.g. Oats with banana" value="${meal || ''}">
      <input type="number" class="num-input" min="1" max="10" placeholder="1-10" value="${energy || ''}">
      <input type="number" class="num-input" min="1" max="10" placeholder="1-10" value="${performance || ''}">
      <button class="remove-entry" onclick="removeEntry(${entryCount})">✕</button>
    `;
    container.appendChild(row);
  }

  function removeEntry(id) {
    const row = document.querySelector('[data-entry-id="' + id + '"]');
    if (row) row.remove();
  }

  function analyzeEntries() {
    const rows = document.querySelectorAll('.entry-row');
    const entries = [];

    rows.forEach(row => {
      const inputs = row.querySelectorAll('input');
      const meal = inputs[0].value.trim();
      const energy = parseFloat(inputs[1].value);
      const performance = parseFloat(inputs[2].value);

      if (meal && !isNaN(energy) && !isNaN(performance)) {
        entries.push({ meal, energy, performance });
      }
    });

    const message = document.getElementById('message');
    const statRow = document.getElementById('statRow');
    statRow.innerHTML = '';

    if (entries.length < 2) {
      message.textContent = "Add at least 2-3 entries to start seeing a pattern. More entries over time make this more reliable.";
      document.getElementById('result').classList.add('visible');
      return;
    }

    const avgEnergy = entries.reduce((sum, e) => sum + e.energy, 0) / entries.length;
    const avgPerformance = entries.reduce((sum, e) => sum + e.performance, 0) / entries.length;

    const best = entries.reduce((a, b) => (a.energy + a.performance) > (b.energy + b.performance) ? a : b);
    const worst = entries.reduce((a, b) => (a.energy + a.performance) < (b.energy + b.performance) ? a : b);

    statRow.innerHTML = `
      <div class="stat-box"><div class="stat-value">${avgEnergy.toFixed(1)}</div><div class="stat-label">Avg Energy</div></div>
      <div class="stat-box"><div class="stat-value">${avgPerformance.toFixed(1)}</div><div class="stat-label">Avg Performance</div></div>
    `;

    if (best.meal === worst.meal) {
      message.textContent = "Not enough variation yet to spot a clear pattern — try logging a wider range of pre-training meals to compare.";
    } else {
      message.textContent = "Your best combined session followed \"" + best.meal + "\" (Energy " + best.energy + ", Performance " + best.performance + "). Your lowest followed \"" + worst.meal + "\" (Energy " + worst.energy + ", Performance " + worst.performance + "). Worth noticing whether that's a one-off or a genuine pattern across more entries.";
    }

    document.getElementById('result').classList.add('visible');
  }

  // Pre-fill with example entries
  addEntry('Oats with banana and peanut butter', 8, 8);
  addEntry('Just coffee - skipped breakfast', 4, 5);
  addEntry('Smoothie with plant protein', 7, 7);
</script>

</body>
</html>
