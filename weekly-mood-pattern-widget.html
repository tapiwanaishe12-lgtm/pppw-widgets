<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Mood Pattern</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    margin: 0;
    padding: 24px 16px;
    background: #ffffff;
    display: flex;
    justify-content: center;
  }
  .card {
    width: 100%;
    max-width: 540px;
    border: 1px solid #d1d5db;
    border-radius: 12px;
    padding: 28px 24px;
    background: #ffffff;
  }
  .eyebrow {
    color: #16a34a;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin: 0 0 6px 0;
  }
  h1 {
    font-size: 22px;
    font-weight: 700;
    color: #111827;
    margin: 0 0 8px 0;
  }
  .subtitle {
    font-size: 14px;
    color: #4b5563;
    line-height: 1.5;
    margin: 0 0 20px 0;
  }

  .day-grid {
    display: flex;
    gap: 6px;
    margin-top: 16px;
  }
  .day-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .day-label {
    font-size: 11px;
    font-weight: 600;
    color: #6b7280;
    margin-bottom: 6px;
  }
  .mood-select {
    width: 100%;
    padding: 6px 2px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    font-size: 16px;
    text-align: center;
    background: #ffffff;
    color: #111827;
  }
  .mood-select:focus {
    outline: none;
    border-color: #16a34a;
  }

  button.plot-btn {
    width: 100%;
    margin-top: 20px;
    padding: 13px;
    background: #16a34a;
    color: #ffffff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  button.plot-btn:hover { background: #128a3e; }

  .result {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid #e5e7eb;
    display: none;
  }
  .result.visible { display: block; }

  .chart-area {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    height: 120px;
    margin-top: 10px;
  }
  .chart-bar-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
    justify-content: flex-end;
  }
  .chart-bar {
    width: 100%;
    background: #16a34a;
    border-radius: 4px 4px 0 0;
    transition: height 0.3s ease;
  }
  .chart-bar-label {
    font-size: 10px;
    color: #6b7280;
    margin-top: 4px;
  }

  .message {
    font-size: 13px;
    color: #374151;
    background: #f0fdf4;
    border: 1px solid #bbf7d0;
    border-radius: 8px;
    padding: 12px 14px;
    margin-top: 16px;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div class="card">
  <p class="eyebrow">Plant Powered Performance World</p>
  <h1>Weekly Mood Pattern</h1>
  <p class="subtitle">Rate each day of the week, then see the pattern plotted across all seven.</p>

  <div class="day-grid" id="dayGrid"></div>

  <button class="plot-btn" onclick="plotPattern()">Plot My Week</button>

  <div class="result" id="result">
    <div class="chart-area" id="chartArea"></div>
    <div class="message" id="message"></div>
  </div>
</div>

<script>
  const moodOptions = ['', '😞', '😕', '😐', '🙂', '😄'];
  const moodValues = { '😞': 1, '😕': 2, '😐': 3, '🙂': 4, '😄': 5 };
  const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];

  function renderGrid() {
    const grid = document.getElementById('dayGrid');
    grid.innerHTML = '';

    days.forEach((day, i) => {
      const col = document.createElement('div');
      col.className = 'day-col';
      const select = document.createElement('select');
      select.className = 'mood-select';
      select.id = 'day-' + i;
      moodOptions.forEach(opt => {
        const option = document.createElement('option');
        option.value = opt;
        option.textContent = opt || '—';
        select.appendChild(option);
      });
      col.innerHTML = '<div class="day-label">' + day + '</div>';
      col.appendChild(select);
      grid.appendChild(col);
    });
  }

  function plotPattern() {
    const result = document.getElementById('result');
    const chartArea = document.getElementById('chartArea');
    chartArea.innerHTML = '';

    const values = [];
    days.forEach((day, i) => {
      const select = document.getElementById('day-' + i);
      const emoji = select.value;
      const value = moodValues[emoji] || 0;
      values.push({ day, value, emoji });
    });

    const loggedValues = values.filter(v => v.value > 0);

    if (loggedValues.length === 0) {
      document.getElementById('message').textContent = "Select a mood for at least one day to see your pattern.";
      result.classList.add('visible');
      return;
    }

    values.forEach(v => {
      const wrap = document.createElement('div');
      wrap.className = 'chart-bar-wrap';
      const heightPercent = v.value > 0 ? (v.value / 5) * 100 : 4;
      const bar = document.createElement('div');
      bar.className = 'chart-bar';
      bar.style.height = heightPercent + '%';
      bar.style.opacity = v.value > 0 ? '1' : '0.15';
      wrap.appendChild(bar);
      const label = document.createElement('div');
      label.className = 'chart-bar-label';
      label.textContent = v.day;
      wrap.appendChild(label);
      chartArea.appendChild(wrap);
    });

    const avg = loggedValues.reduce((sum, v) => sum + v.value, 0) / loggedValues.length;
    const best = loggedValues.reduce((a, b) => a.value > b.value ? a : b);
    const worst = loggedValues.reduce((a, b) => a.value < b.value ? a : b);

    const message = document.getElementById('message');
    if (best.day === worst.day) {
      message.textContent = "Add a few more days to start seeing a real pattern across the week.";
    } else {
      message.textContent = best.day + " was your highest day, " + worst.day + " your lowest. Worth noticing what was different about " + worst.day + " — a schedule pattern, a specific stressor, or something worth adjusting.";
    }

    result.classList.add('visible');
  }

  renderGrid();
</script>

</body>
</html>
