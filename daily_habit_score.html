<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Habit Score</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #ffffff;
    color: #111111;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px;
  }

  .card {
    background: #ffffff;
    border: 2px solid #111111;
    border-radius: 16px;
    padding: 32px;
    max-width: 560px;
    width: 100%;
  }

  .brand {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #16a34a;
    margin-bottom: 8px;
  }

  h1 {
    font-size: 22px;
    font-weight: 700;
    color: #111111;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 13px;
    color: #6b7280;
    margin-bottom: 24px;
    line-height: 1.6;
  }

  .category {
    margin-bottom: 18px;
  }

  .category-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .category-title {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #111111;
  }

  .category-count {
    font-size: 11px;
    font-weight: 600;
    color: #9ca3af;
  }

  .habit-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border: 1.5px solid #e5e7eb;
    border-radius: 8px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: all 0.15s;
    background: #ffffff;
  }

  .habit-row:hover { border-color: #16a34a; }
  .habit-row.checked { background: #f0fdf4; border-color: #16a34a; }

  .checkbox {
    width: 18px;
    height: 18px;
    border: 2px solid #d1d5db;
    border-radius: 5px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .habit-row.checked .checkbox {
    background: #16a34a;
    border-color: #16a34a;
  }

  .checkbox svg { display: none; width: 11px; height: 11px; }
  .habit-row.checked .checkbox svg { display: block; }

  .habit-input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 13px;
    color: #111111;
    background: transparent;
  }

  .habit-input::placeholder { color: #9ca3af; }

  .remove-habit {
    width: 20px;
    height: 20px;
    border: none;
    background: transparent;
    color: #d1d5db;
    cursor: pointer;
    font-size: 16px;
    flex-shrink: 0;
  }

  .remove-habit:hover { color: #dc2626; }

  .add-habit-btn {
    width: 100%;
    padding: 8px;
    border: 1.5px dashed #e5e7eb;
    border-radius: 8px;
    background: #ffffff;
    color: #6b7280;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }

  .add-habit-btn:hover { border-color: #16a34a; color: #16a34a; }

  .divider { border: none; border-top: 1px solid #e5e7eb; margin: 20px 0; }

  .score-display {
    text-align: center;
    padding: 24px;
    border-radius: 12px;
    border: 2px solid;
    margin-top: 8px;
    transition: all 0.3s;
  }

  .score-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .score-num {
    font-size: 48px;
    font-weight: 700;
    color: #111111;
    line-height: 1;
    margin-bottom: 4px;
  }

  .score-sub {
    font-size: 12px;
    color: #6b7280;
    margin-bottom: 12px;
  }

  .score-badge {
    display: inline-block;
    padding: 5px 16px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    color: #ffffff;
  }

  .bar-track {
    height: 8px;
    background: #f3f4f6;
    border-radius: 4px;
    margin-top: 16px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.5s ease, background 0.3s;
  }
</style>
</head>
<body>
<div class="card">
  <div class="brand">🏃 Plant Powered Performance World</div>
  <h1>Daily Habit Score</h1>
  <p class="subtitle">Tick off the habits you completed today across each category to see your overall consistency score.</p>

  <div id="categoriesContainer"></div>

  <div class="score-display" id="scoreDisplay">
    <div class="score-label" id="scoreLabel">Today's Score</div>
    <div class="score-num" id="scoreNum">0%</div>
    <div class="score-sub" id="scoreSub">0 of 0 habits completed</div>
    <span class="score-badge" id="scoreBadge">Get Started</span>
    <div class="bar-track"><div class="bar-fill" id="barFill" style="width:0%"></div></div>
  </div>
</div>

<script>
const categories = [
  { name: '💪 Health & Fitness', habits: ['Trained or exercised', 'Hit step goal'] },
  { name: '🧠 Mindset & Wellbeing', habits: ['Meditated', 'Journalled'] },
  { name: '🥗 Nutrition', habits: ['Hit protein target', 'Drank enough water'] },
  { name: '📚 Learning & Growth', habits: ['Read or studied'] },
];

const container = document.getElementById('categoriesContainer');

function render() {
  container.innerHTML = '';
  categories.forEach((cat, ci) => {
    const div = document.createElement('div');
    div.className = 'category';

    const checkedCount = cat.habits.filter(h => h.checked).length;

    div.innerHTML = `
      <div class="category-header">
        <span class="category-title">${cat.name}</span>
        <span class="category-count">${checkedCount}/${cat.habits.length}</span>
      </div>
      <div id="habits-${ci}"></div>
      <button class="add-habit-btn" onclick="addHabit(${ci})">+ Add habit</button>
    `;
    container.appendChild(div);

    const habitsDiv = div.querySelector(`#habits-${ci}`);
    cat.habits.forEach((h, hi) => {
      const row = document.createElement('div');
      row.className = 'habit-row' + (h.checked ? ' checked' : '');
      row.innerHTML = `
        <div class="checkbox" onclick="toggleHabit(${ci}, ${hi})">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <input class="habit-input" value="${typeof h === 'string' ? h : h.name}" placeholder="Habit name" onchange="renameHabit(${ci}, ${hi}, this.value)">
        <button class="remove-habit" onclick="removeHabit(${ci}, ${hi})">×</button>
      `;
      habitsDiv.appendChild(row);
    });
  });
  updateScore();
}

function toggleHabit(ci, hi) {
  const h = categories[ci].habits[hi];
  if (typeof h === 'string') {
    categories[ci].habits[hi] = { name: h, checked: true };
  } else {
    h.checked = !h.checked;
  }
  render();
}

function renameHabit(ci, hi, val) {
  const h = categories[ci].habits[hi];
  if (typeof h === 'string') {
    categories[ci].habits[hi] = { name: val, checked: false };
  } else {
    h.name = val;
  }
}

function addHabit(ci) {
  categories[ci].habits.push({ name: '', checked: false });
  render();
  setTimeout(() => {
    const inputs = document.querySelectorAll(`#habits-${ci} .habit-input`);
    if (inputs.length) inputs[inputs.length - 1].focus();
  }, 50);
}

function removeHabit(ci, hi) {
  categories[ci].habits.splice(hi, 1);
  render();
}

function updateScore() {
  let total = 0, checked = 0;
  categories.forEach(cat => {
    cat.habits.forEach(h => {
      total++;
      if (typeof h !== 'string' && h.checked) checked++;
    });
  });

  const pct = total > 0 ? Math.round((checked / total) * 100) : 0;
  document.getElementById('scoreNum').textContent = pct + '%';
  document.getElementById('scoreSub').textContent = `${checked} of ${total} habits completed`;
  document.getElementById('barFill').style.width = pct + '%';

  let color, bg, badge;
  if (pct >= 90) { color = '#15803d'; bg = '#f0fdf4'; badge = '🏆 Exceptional Day'; }
  else if (pct >= 70) { color = '#16a34a'; bg = '#f0fdf4'; badge = '💪 Strong Day'; }
  else if (pct >= 40) { color = '#d97706'; bg = '#fffbeb'; badge = '🔄 Building Momentum'; }
  else if (total === 0) { color = '#6b7280'; bg = '#f9fafb'; badge = 'Add Your Habits'; }
  else { color = '#dc2626'; bg = '#fef2f2'; badge = '🎯 Room to Improve'; }

  const display = document.getElementById('scoreDisplay');
  display.style.background = bg;
  display.style.borderColor = color;
  document.getElementById('scoreLabel').style.color = color;
  document.getElementById('scoreBadge').style.background = color;
  document.getElementById('scoreBadge').textContent = badge;
  document.getElementById('barFill').style.background = color;
}

render();
</script>
</body>
</html>
