<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Run Streak Tracker</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    margin: 0;
    padding: 24px 16px;
    background: #ffffff;
    display: flex;
    justify-content: center;
  }
  .card {
    width: 100%;
    max-width: 480px;
    border: 1px solid #d1d5db;
    border-radius: 12px;
    padding: 28px 24px;
    background: #ffffff;
  }
  .eyebrow {
    color: #16a34a;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin: 0 0 6px 0;
  }
  h1 {
    font-size: 22px;
    font-weight: 700;
    color: #111827;
    margin: 0 0 8px 0;
  }
  .subtitle {
    font-size: 14px;
    color: #4b5563;
    line-height: 1.5;
    margin: 0 0 20px 0;
  }

  .stats-row {
    display: flex;
    gap: 12px;
  }
  .stat-box {
    flex: 1;
    text-align: center;
    background: #f0fdf4;
    border: 1px solid #bbf7d0;
    border-radius: 10px;
    padding: 16px 10px;
  }
  .stat-number {
    font-size: 32px;
    font-weight: 700;
    color: #16a34a;
  }
  .stat-label {
    font-size: 12px;
    color: #4b5563;
    margin-top: 4px;
  }

  .week-grid {
    display: flex;
    gap: 6px;
    margin-top: 20px;
  }
  .week-dot {
    flex: 1;
    height: 36px;
    border-radius: 6px;
    background: #e5e7eb;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }
  .week-dot.filled { background: #16a34a; }
  .week-label {
    font-size: 11px;
    color: #6b7280;
    text-align: center;
    margin-top: 4px;
  }

  button.complete-btn {
    width: 100%;
    margin-top: 22px;
    padding: 13px;
    background: #16a34a;
    color: #ffffff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  button.complete-btn:hover { background: #128a3e; }
  button.complete-btn:disabled { background: #d1d5db; cursor: default; }

  .rest-btn {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    background: #ffffff;
    color: #6b7280;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }
  .rest-btn:hover { border-color: #16a34a; color: #16a34a; }

  .reset-btn {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    background: #ffffff;
    color: #6b7280;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }
  .reset-btn:hover { border-color: #b91c1c; color: #b91c1c; }

  .message {
    font-size: 13px;
    color: #374151;
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    padding: 12px 14px;
    margin-top: 16px;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div class="card">
  <p class="eyebrow">Plant Powered Performance World</p>
  <h1>Run Streak Tracker</h1>
  <p class="subtitle">Mark today's run complete, or take a planned rest day without breaking the streak.</p>

  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-number" id="currentStreak">0</div>
      <div class="stat-label">Current Streak</div>
    </div>
    <div class="stat-box">
      <div class="stat-number" id="bestStreak">0</div>
      <div class="stat-label">Best Streak</div>
    </div>
  </div>

  <div class="week-grid" id="weekGrid"></div>

  <button class="complete-btn" id="completeBtn" onclick="markComplete()">Mark Today's Run Done</button>
  <button class="rest-btn" onclick="markRestDay()">Planned Rest Day (Keeps Streak)</button>
  <button class="reset-btn" onclick="resetStreak()">Reset Streak</button>

  <div class="message" id="message"></div>
</div>

<script>
  let currentStreak = 0;
  let bestStreak = 0;
  let weekHistory = ['', '', '', '', '', '', '']; // '' none, 'run', 'rest'
  let todayLogged = false;

  function renderWeekGrid() {
    const grid = document.getElementById('weekGrid');
    grid.innerHTML = '';
    const labels = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Today'];

    weekHistory.forEach((status, i) => {
      const wrapper = document.createElement('div');
      wrapper.style.flex = '1';
      const dot = document.createElement('div');
      dot.className = 'week-dot' + (status ? ' filled' : '');
      dot.textContent = status === 'run' ? '🏃' : status === 'rest' ? '💤' : '';
      wrapper.appendChild(dot);
      const label = document.createElement('div');
      label.className = 'week-label';
      label.textContent = labels[i];
      wrapper.appendChild(label);
      grid.appendChild(wrapper);
    });
  }

  function markComplete() {
    if (todayLogged) return;
    todayLogged = true;
    currentStreak++;
    if (currentStreak > bestStreak) bestStreak = currentStreak;

    weekHistory.shift();
    weekHistory.push('run');

    updateUI();
  }

  function markRestDay() {
    if (todayLogged) return;
    todayLogged = true;

    weekHistory.shift();
    weekHistory.push('rest');

    updateUI();
  }

  function resetStreak() {
    currentStreak = 0;
    todayLogged = false;
    weekHistory = ['', '', '', '', '', '', ''];
    updateUI();
  }

  function updateUI() {
    document.getElementById('currentStreak').textContent = currentStreak;
    document.getElementById('bestStreak').textContent = bestStreak;
    document.getElementById('completeBtn').disabled = todayLogged;
    document.getElementById('completeBtn').textContent = todayLogged ? "Today Logged ✓" : "Mark Today's Run Done";

    renderWeekGrid();
    updateMessage();
  }

  function updateMessage() {
    const message = document.getElementById('message');
    if (currentStreak === 0) {
      message.textContent = "Log your first run to start the streak.";
    } else if (currentStreak >= 30) {
      message.textContent = "30+ days of consistent running. This is no longer a goal — it's who you are now.";
    } else if (currentStreak >= 7) {
      message.textContent = "A full week strong. This is where the habit stops requiring motivation.";
    } else {
      message.textContent = "Streak of " + currentStreak + ". Every logged day protects the one before it.";
    }
  }

  updateUI();
</script>

</body>
</html>
