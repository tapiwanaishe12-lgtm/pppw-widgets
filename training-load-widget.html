<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training Load Check</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    margin: 0;
    padding: 24px 16px;
    background: #ffffff;
    display: flex;
    justify-content: center;
  }
  .card {
    width: 100%;
    max-width: 500px;
    border: 1px solid #d1d5db;
    border-radius: 12px;
    padding: 28px 24px;
    background: #ffffff;
  }
  .eyebrow {
    color: #16a34a;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin: 0 0 6px 0;
  }
  h1 {
    font-size: 22px;
    font-weight: 700;
    color: #111827;
    margin: 0 0 8px 0;
  }
  .subtitle {
    font-size: 14px;
    color: #4b5563;
    line-height: 1.5;
    margin: 0 0 20px 0;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #111827;
    margin-bottom: 8px;
    margin-top: 16px;
  }
  .stepper-row {
    display: flex;
    align-items: center;
    gap: 12px;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    padding: 10px 14px;
  }
  .stepper-row-label { flex: 1; font-size: 14px; color: #111827; }
  .stepper-btn {
    width: 30px;
    height: 30px;
    border-radius: 6px;
    border: 1px solid #d1d5db;
    background: #ffffff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    color: #111827;
  }
  .stepper-btn:hover { border-color: #16a34a; }
  .stepper-count {
    min-width: 20px;
    text-align: center;
    font-weight: 700;
    color: #16a34a;
  }
  button.generate {
    width: 100%;
    margin-top: 22px;
    padding: 13px;
    background: #16a34a;
    color: #ffffff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  button.generate:hover { background: #128a3e; }

  .result {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid #e5e7eb;
    display: none;
    text-align: center;
  }
  .result.visible { display: block; }
  .load-label {
    font-size: 24px;
    font-weight: 700;
    color: #16a34a;
    margin: 0;
  }
  .load-sublabel {
    font-size: 13px;
    color: #4b5563;
    margin: 2px 0 16px 0;
  }
  .progress-track {
    width: 100%;
    height: 10px;
    background: #e5e7eb;
    border-radius: 999px;
    overflow: hidden;
    text-align: left;
  }
  .progress-fill {
    height: 100%;
    border-radius: 999px;
    transition: width 0.4s ease, background 0.4s ease;
    width: 0%;
  }
  .message {
    font-size: 13px;
    color: #374151;
    background: #f0fdf4;
    border: 1px solid #bbf7d0;
    border-radius: 8px;
    padding: 12px 14px;
    margin-top: 16px;
    line-height: 1.5;
    text-align: left;
  }
</style>
</head>
<body>

<div class="card">
  <p class="eyebrow">Plant Powered Performance World</p>
  <h1>Training Load Check</h1>
  <p class="subtitle">Log this week's sessions by intensity to get a read on whether to push or recover.</p>

  <label>This week's sessions</label>

  <div class="stepper-row">
    <span class="stepper-row-label">🔴 High intensity</span>
    <button class="stepper-btn" onclick="adjust('high', -1)">−</button>
    <span class="stepper-count" id="highCount">0</span>
    <button class="stepper-btn" onclick="adjust('high', 1)">+</button>
  </div>

  <div class="stepper-row" style="margin-top:10px;">
    <span class="stepper-row-label">🟡 Moderate intensity</span>
    <button class="stepper-btn" onclick="adjust('moderate', -1)">−</button>
    <span class="stepper-count" id="moderateCount">0</span>
    <button class="stepper-btn" onclick="adjust('moderate', 1)">+</button>
  </div>

  <div class="stepper-row" style="margin-top:10px;">
    <span class="stepper-row-label">🟢 Light / recovery</span>
    <button class="stepper-btn" onclick="adjust('light', -1)">−</button>
    <span class="stepper-count" id="lightCount">0</span>
    <button class="stepper-btn" onclick="adjust('light', 1)">+</button>
  </div>

  <div class="stepper-row" style="margin-top:10px;">
    <span class="stepper-row-label">⚪ Full rest days</span>
    <button class="stepper-btn" onclick="adjust('rest', -1)">−</button>
    <span class="stepper-count" id="restCount">0</span>
    <button class="stepper-btn" onclick="adjust('rest', 1)">+</button>
  </div>

  <button class="generate" onclick="calculateLoad()">Check My Training Load</button>

  <div class="result" id="result">
    <p class="load-label" id="loadLabel"></p>
    <p class="load-sublabel" id="loadSublabel"></p>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="message" id="message"></div>
  </div>
</div>

<script>
  let counts = { high: 0, moderate: 0, light: 0, rest: 0 };

  function adjust(type, delta) {
    const newVal = counts[type] + delta;
    if (newVal < 0 || newVal > 7) return;
    counts[type] = newVal;
    document.getElementById(type + 'Count').textContent = newVal;
  }

  function calculateLoad() {
    const totalSessions = counts.high + counts.moderate + counts.light + counts.rest;
    const result = document.getElementById('result');

    if (totalSessions === 0) {
      document.getElementById('loadLabel').textContent = "No data yet";
      document.getElementById('loadSublabel').textContent = "Log at least one session above";
      document.getElementById('progressFill').style.width = '0%';
      document.getElementById('message').textContent = "Add your sessions using the counters above, then check your load.";
      result.classList.add('visible');
      return;
    }

    // Weighted load score: high=3, moderate=2, light=1, rest=0
    const loadScore = (counts.high * 3) + (counts.moderate * 2) + (counts.light * 1);
    const maxPossible = totalSessions * 3;
    const loadPercent = Math.round((loadScore / maxPossible) * 100);
    const restDayPercent = Math.round((counts.rest / totalSessions) * 100);

    const loadLabel = document.getElementById('loadLabel');
    const loadSublabel = document.getElementById('loadSublabel');
    const progressFill = document.getElementById('progressFill');
    const message = document.getElementById('message');

    progressFill.style.width = loadPercent + '%';

    if (counts.rest === 0 && (counts.high + counts.moderate) >= 5) {
      loadLabel.textContent = "High Load, No Rest";
      loadSublabel.textContent = "Recovery risk";
      progressFill.style.background = '#dc2626';
      message.textContent = "Zero rest days with a heavy week is where overtraining and injury usually start. Build in at least one full rest day before pushing further.";
    } else if (loadPercent >= 70) {
      loadLabel.textContent = "High Load Week";
      loadSublabel.textContent = "Push phase";
      progressFill.style.background = '#f59e0b';
      message.textContent = "This is a demanding week. Make sure sleep and nutrition are matching the effort — this is where gains are made, but also where burnout starts if it's not balanced.";
    } else if (loadPercent >= 40) {
      loadLabel.textContent = "Balanced Load";
      loadSublabel.textContent = "Sustainable";
      progressFill.style.background = '#16a34a';
      message.textContent = "This is a sustainable mix of effort and recovery — the kind of week that compounds well over months without burning you out.";
    } else {
      loadLabel.textContent = "Light Load Week";
      loadSublabel.textContent = "Recovery-leaning";
      progressFill.style.background = '#3b82f6';
      message.textContent = "A lighter week. If this is planned recovery, good — it's part of the process. If it's not planned, worth asking what got in the way of training.";
    }

    result.classList.add('visible');
  }
</script>

</body>
</html>
