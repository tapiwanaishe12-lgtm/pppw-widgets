<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gratitude Log</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    margin: 0;
    padding: 24px 16px;
    background: #ffffff;
    display: flex;
    justify-content: center;
  }
  .card {
    width: 100%;
    max-width: 500px;
    border: 1px solid #d1d5db;
    border-radius: 12px;
    padding: 28px 24px;
    background: #ffffff;
  }
  .eyebrow {
    color: #16a34a;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin: 0 0 6px 0;
  }
  h1 {
    font-size: 22px;
    font-weight: 700;
    color: #111827;
    margin: 0 0 8px 0;
  }
  .subtitle {
    font-size: 14px;
    color: #4b5563;
    line-height: 1.5;
    margin: 0 0 20px 0;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #111827;
    margin-bottom: 8px;
    margin-top: 14px;
  }
  input[type="text"] {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 14px;
    color: #111827;
  }
  input:focus {
    outline: none;
    border-color: #16a34a;
    box-shadow: 0 0 0 3px rgba(22,163,74,0.15);
  }

  button.save-btn {
    width: 100%;
    margin-top: 20px;
    padding: 13px;
    background: #16a34a;
    color: #ffffff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  button.save-btn:hover { background: #128a3e; }

  .streak-row {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    padding-top: 18px;
    border-top: 1px solid #e5e7eb;
  }
  .stat-box {
    flex: 1;
    text-align: center;
    background: #f0fdf4;
    border: 1px solid #bbf7d0;
    border-radius: 10px;
    padding: 12px 8px;
  }
  .stat-value {
    font-size: 22px;
    font-weight: 700;
    color: #16a34a;
  }
  .stat-label {
    font-size: 11px;
    color: #4b5563;
    margin-top: 2px;
  }

  .history-section {
    margin-top: 20px;
  }
  .section-label {
    font-size: 12px;
    font-weight: 700;
    color: #16a34a;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 10px;
  }
  .day-entry {
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 8px;
    font-size: 13px;
    color: #374151;
    line-height: 1.6;
  }
  .empty-note {
    font-size: 13px;
    color: #9ca3af;
  }
</style>
</head>
<body>

<div class="card">
  <p class="eyebrow">Plant Powered Performance World</p>
  <h1>Gratitude Log</h1>
  <p class="subtitle">Three things, quickly. Specific beats profound.</p>

  <label for="g1">1.</label>
  <input type="text" id="g1" placeholder="e.g. The coffee was actually hot for once">

  <label for="g2">2.</label>
  <input type="text" id="g2" placeholder="e.g. A text from an old friend">

  <label for="g3">3.</label>
  <input type="text" id="g3" placeholder="e.g. Finished a task I'd been avoiding">

  <button class="save-btn" onclick="saveEntry()">Log Today's Gratitude</button>

  <div class="streak-row">
    <div class="stat-box">
      <div class="stat-value" id="entryCount">0</div>
      <div class="stat-label">Entries This Session</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="itemCount">0</div>
      <div class="stat-label">Total Things Logged</div>
    </div>
  </div>

  <div class="history-section">
    <p class="section-label">This Session's Entries</p>
    <div id="historyList"></div>
  </div>
</div>

<script>
  let entries = [];

  function saveEntry() {
    const g1 = document.getElementById('g1').value.trim();
    const g2 = document.getElementById('g2').value.trim();
    const g3 = document.getElementById('g3').value.trim();

    const items = [g1, g2, g3].filter(g => g.length > 0);
    if (items.length === 0) return;

    entries.unshift(items);

    document.getElementById('g1').value = '';
    document.getElementById('g2').value = '';
    document.getElementById('g3').value = '';

    updateStats();
    renderHistory();
  }

  function updateStats() {
    document.getElementById('entryCount').textContent = entries.length;
    const totalItems = entries.reduce((sum, e) => sum + e.length, 0);
    document.getElementById('itemCount').textContent = totalItems;
  }

  function renderHistory() {
    const list = document.getElementById('historyList');
    list.innerHTML = '';

    if (entries.length === 0) {
      list.innerHTML = '<p class="empty-note">No entries logged yet this session.</p>';
      return;
    }

    entries.forEach(items => {
      const div = document.createElement('div');
      div.className = 'day-entry';
      div.innerHTML = items.map(i => '• ' + i).join('<br>');
      list.appendChild(div);
    });
  }

  renderHistory();
</script>

</body>
</html>
