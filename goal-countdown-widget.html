<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goal Countdown</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    margin: 0;
    padding: 24px 16px;
    background: #ffffff;
    display: flex;
    justify-content: center;
  }
  .card {
    width: 100%;
    max-width: 480px;
    border: 1px solid #d1d5db;
    border-radius: 12px;
    padding: 28px 24px;
    background: #ffffff;
  }
  .eyebrow {
    color: #16a34a;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin: 0 0 6px 0;
  }
  h1 {
    font-size: 22px;
    font-weight: 700;
    color: #111827;
    margin: 0 0 8px 0;
  }
  .subtitle {
    font-size: 14px;
    color: #4b5563;
    line-height: 1.5;
    margin: 0 0 20px 0;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #111827;
    margin-bottom: 8px;
    margin-top: 16px;
  }
  input[type="text"], input[type="date"] {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 14px;
    color: #111827;
  }
  input:focus {
    outline: none;
    border-color: #16a34a;
    box-shadow: 0 0 0 3px rgba(22,163,74,0.15);
  }
  button {
    width: 100%;
    margin-top: 20px;
    padding: 13px;
    background: #16a34a;
    color: #ffffff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: #128a3e; }

  .result {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid #e5e7eb;
    display: none;
    text-align: center;
  }
  .result.visible { display: block; }
  .days-left {
    font-size: 40px;
    font-weight: 700;
    color: #16a34a;
    margin: 0;
  }
  .days-left-label {
    font-size: 13px;
    color: #4b5563;
    margin: 2px 0 16px 0;
  }
  .progress-track {
    width: 100%;
    height: 10px;
    background: #e5e7eb;
    border-radius: 999px;
    overflow: hidden;
    text-align: left;
  }
  .progress-fill {
    height: 100%;
    background: #16a34a;
    border-radius: 999px;
    transition: width 0.4s ease;
    width: 0%;
  }
  .progress-caption {
    font-size: 13px;
    color: #4b5563;
    margin-top: 8px;
    text-align: left;
  }
  .message {
    font-size: 13px;
    color: #374151;
    background: #f0fdf4;
    border: 1px solid #bbf7d0;
    border-radius: 8px;
    padding: 12px 14px;
    margin-top: 16px;
    line-height: 1.5;
    text-align: left;
  }
  .error-text {
    font-size: 13px;
    color: #b91c1c;
    margin-top: 10px;
    display: none;
  }
  .error-text.visible { display: block; }
</style>
</head>
<body>

<div class="card">
  <p class="eyebrow">Plant Powered Performance World</p>
  <h1>Goal Countdown</h1>
  <p class="subtitle">Enter your goal and its target date to see how much runway is left.</p>

  <label for="goalName">Goal name (optional)</label>
  <input type="text" id="goalName" placeholder="e.g. Sub-1:30 half marathon">

  <label for="startDate">When did you set this goal?</label>
  <input type="date" id="startDate">

  <label for="targetDate">Target date</label>
  <input type="date" id="targetDate">

  <button onclick="calculateCountdown()">Show My Countdown</button>
  <p class="error-text" id="errorText">Target date needs to be after the start date — double check your dates.</p>

  <div class="result" id="result">
    <p class="days-left" id="daysLeft"></p>
    <p class="days-left-label" id="daysLeftLabel">days remaining</p>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <p class="progress-caption" id="progressCaption"></p>
    <div class="message" id="message"></div>
  </div>
</div>

<script>
  function calculateCountdown() {
    const goalName = document.getElementById('goalName').value.trim();
    const startInput = document.getElementById('startDate').value;
    const targetInput = document.getElementById('targetDate').value;
    const result = document.getElementById('result');
    const errorText = document.getElementById('errorText');

    if (!targetInput) {
      result.classList.remove('visible');
      errorText.classList.remove('visible');
      return;
    }

    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const targetDate = new Date(targetInput + 'T00:00:00');

    let startDate;
    if (startInput) {
      startDate = new Date(startInput + 'T00:00:00');
    } else {
      startDate = today;
    }

    if (targetDate <= startDate) {
      result.classList.remove('visible');
      errorText.classList.add('visible');
      return;
    }

    errorText.classList.remove('visible');

    const msPerDay = 1000 * 60 * 60 * 24;
    const totalDays = Math.round((targetDate - startDate) / msPerDay);
    const daysElapsed = Math.round((today - startDate) / msPerDay);
    const daysRemaining = Math.round((targetDate - today) / msPerDay);

    const percentElapsed = Math.min(100, Math.max(0, Math.round((daysElapsed / totalDays) * 100)));

    document.getElementById('daysLeft').textContent = daysRemaining >= 0 ? daysRemaining : 0;
    document.getElementById('daysLeftLabel').textContent = (goalName ? goalName + " — " : "") + "days remaining";
    document.getElementById('progressFill').style.width = percentElapsed + '%';
    document.getElementById('progressCaption').textContent = percentElapsed + '% of your timeline has passed';

    const messageBox = document.getElementById('message');
    if (daysRemaining < 0) {
      messageBox.textContent = "This target date has passed. Worth deciding: adjust the date, or mark this goal as achieved if it's done.";
    } else if (daysRemaining === 0) {
      messageBox.textContent = "Today's the day. Whatever this goal was building toward, it comes down to today.";
    } else if (percentElapsed >= 80) {
      messageBox.textContent = "You're deep into the timeline now. This is where consistency matters more than intensity.";
    } else if (percentElapsed >= 50) {
      messageBox.textContent = "You're past the halfway point. A good moment to check the habit behind this goal is still serving it.";
    } else {
      messageBox.textContent = "Plenty of runway left. Early days are for building the habit, not judging the outcome.";
    }

    result.classList.add('visible');
  }
</script>

</body>
</html>
