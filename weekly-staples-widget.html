<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Staples</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    margin: 0;
    padding: 24px 16px;
    background: #ffffff;
    display: flex;
    justify-content: center;
  }
  .card {
    width: 100%;
    max-width: 480px;
    border: 1px solid #d1d5db;
    border-radius: 12px;
    padding: 28px 24px;
    background: #ffffff;
  }
  .eyebrow {
    color: #16a34a;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin: 0 0 6px 0;
  }
  h1 {
    font-size: 22px;
    font-weight: 700;
    color: #111827;
    margin: 0 0 8px 0;
  }
  .subtitle {
    font-size: 14px;
    color: #4b5563;
    line-height: 1.5;
    margin: 0 0 20px 0;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #111827;
    margin-bottom: 8px;
    margin-top: 16px;
  }
  .add-row {
    display: flex;
    gap: 8px;
  }
  input[type="text"] {
    flex: 1;
    padding: 10px 12px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 14px;
    color: #111827;
  }
  input:focus {
    outline: none;
    border-color: #16a34a;
    box-shadow: 0 0 0 3px rgba(22,163,74,0.15);
  }
  .add-btn {
    padding: 10px 16px;
    background: #16a34a;
    color: #ffffff;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .add-btn:hover { background: #128a3e; }

  .staples-list { margin-top: 18px; }
  .staple-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 1px solid #f3f4f6;
    font-size: 14px;
    color: #111827;
  }
  .staple-item:last-child { border-bottom: none; }
  .staple-item input[type="checkbox"] { width: 18px; height: 18px; accent-color: #16a34a; }
  .staple-item.checked span { text-decoration: line-through; color: #9ca3af; }
  .staple-item span { flex: 1; }
  .remove-staple {
    background: none;
    border: none;
    color: #9ca3af;
    cursor: pointer;
    font-size: 14px;
    flex-shrink: 0;
  }
  .remove-staple:hover { color: #b91c1c; }

  .footer-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 18px;
    padding-top: 16px;
    border-top: 1px solid #e5e7eb;
  }
  .count-label {
    font-size: 12px;
    color: #6b7280;
  }
  .reset-btn {
    padding: 8px 14px;
    background: #ffffff;
    color: #6b7280;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }
  .reset-btn:hover { border-color: #16a34a; color: #16a34a; }
  .empty-note {
    font-size: 13px;
    color: #9ca3af;
  }
</style>
</head>
<body>

<div class="card">
  <p class="eyebrow">Plant Powered Performance World</p>
  <h1>Weekly Staples</h1>
  <p class="subtitle">Build your standing list once. Check items off as you shop, then reset for next week.</p>

  <label for="staplesInput">Add a staple item</label>
  <div class="add-row">
    <input type="text" id="staplesInput" placeholder="e.g. Oat milk" onkeypress="if(event.key==='Enter') addStaple()">
    <button class="add-btn" onclick="addStaple()">Add</button>
  </div>

  <div class="staples-list" id="staplesList"></div>

  <div class="footer-row">
    <span class="count-label" id="countLabel">0 items</span>
    <button class="reset-btn" onclick="resetChecks()">Reset for New Week</button>
  </div>
</div>

<script>
  let staples = [
    { name: 'Oat milk', checked: false },
    { name: 'Tofu', checked: false },
    { name: 'Chickpeas (canned)', checked: false },
    { name: 'Brown rice', checked: false },
    { name: 'Mixed frozen berries', checked: false }
  ];

  function addStaple() {
    const input = document.getElementById('staplesInput');
    const name = input.value.trim();
    if (!name) return;

    staples.push({ name, checked: false });
    input.value = '';
    renderStaples();
  }

  function toggleStaple(index) {
    staples[index].checked = !staples[index].checked;
    renderStaples();
  }

  function removeStaple(index) {
    staples.splice(index, 1);
    renderStaples();
  }

  function resetChecks() {
    staples.forEach(s => s.checked = false);
    renderStaples();
  }

  function renderStaples() {
    const list = document.getElementById('staplesList');
    list.innerHTML = '';

    if (staples.length === 0) {
      list.innerHTML = '<p class="empty-note">No staples added yet. Add the items you buy every week above.</p>';
      document.getElementById('countLabel').textContent = '0 items';
      return;
    }

    staples.forEach((staple, i) => {
      const div = document.createElement('div');
      div.className = 'staple-item' + (staple.checked ? ' checked' : '');
      div.innerHTML = `
        <input type="checkbox" ${staple.checked ? 'checked' : ''} onchange="toggleStaple(${i})">
        <span>${staple.name}</span>
        <button class="remove-staple" onclick="removeStaple(${i})">✕</button>
      `;
      list.appendChild(div);
    });

    const checkedCount = staples.filter(s => s.checked).length;
    document.getElementById('countLabel').textContent = checkedCount + ' of ' + staples.length + ' checked';
  }

  renderStaples();
</script>

</body>
</html>
