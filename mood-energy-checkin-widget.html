<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Mood & Energy Check-in</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    margin: 0;
    padding: 24px 16px;
    background: #ffffff;
    display: flex;
    justify-content: center;
  }
  .card {
    width: 100%;
    max-width: 480px;
    border: 1px solid #d1d5db;
    border-radius: 12px;
    padding: 28px 24px;
    background: #ffffff;
  }
  .eyebrow {
    color: #16a34a;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin: 0 0 6px 0;
  }
  h1 {
    font-size: 22px;
    font-weight: 700;
    color: #111827;
    margin: 0 0 8px 0;
  }
  .subtitle {
    font-size: 14px;
    color: #4b5563;
    line-height: 1.5;
    margin: 0 0 20px 0;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #111827;
    margin-bottom: 10px;
    margin-top: 18px;
  }
  .scale-row {
    display: flex;
    gap: 8px;
  }
  .scale-btn {
    flex: 1;
    padding: 12px 0;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    background: #ffffff;
    font-size: 20px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s ease;
  }
  .scale-btn:hover {
    border-color: #16a34a;
  }
  .scale-btn.selected {
    border-color: #16a34a;
    background: #f0fdf4;
    box-shadow: 0 0 0 2px rgba(22,163,74,0.25);
  }
  button.submit {
    width: 100%;
    margin-top: 22px;
    padding: 13px;
    background: #16a34a;
    color: #ffffff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  button.submit:hover { background: #128a3e; }
  .result {
    margin-top: 22px;
    padding-top: 18px;
    border-top: 1px solid #e5e7eb;
    display: none;
  }
  .result.visible { display: block; }
  .message {
    font-size: 14px;
    color: #374151;
    background: #f0fdf4;
    border: 1px solid #bbf7d0;
    border-radius: 8px;
    padding: 14px;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div class="card">
  <p class="eyebrow">Plant Powered Performance World</p>
  <h1>Daily Mood & Energy Check-in</h1>
  <p class="subtitle">A quick moment of awareness before your day begins.</p>

  <label>How's your mood today?</label>
  <div class="scale-row" id="moodRow">
    <div class="scale-btn" data-value="1">😞</div>
    <div class="scale-btn" data-value="2">😕</div>
    <div class="scale-btn" data-value="3">😐</div>
    <div class="scale-btn" data-value="4">🙂</div>
    <div class="scale-btn" data-value="5">😄</div>
  </div>

  <label>How's your energy today?</label>
  <div class="scale-row" id="energyRow">
    <div class="scale-btn" data-value="1">🔋</div>
    <div class="scale-btn" data-value="2">🔋</div>
    <div class="scale-btn" data-value="3">🔋</div>
    <div class="scale-btn" data-value="4">🔋</div>
    <div class="scale-btn" data-value="5">🔋</div>
  </div>

  <button class="submit" onclick="checkIn()">Log Check-in</button>

  <div class="result" id="result">
    <div class="message" id="message"></div>
  </div>
</div>

<script>
  let moodValue = null;
  let energyValue = null;

  document.querySelectorAll('#moodRow .scale-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#moodRow .scale-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      moodValue = parseInt(btn.getAttribute('data-value'), 10);
    });
  });

  document.querySelectorAll('#energyRow .scale-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#energyRow .scale-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      energyValue = parseInt(btn.getAttribute('data-value'), 10);
    });
  });

  const messages = {
    lowBoth: "A gentle day might be exactly what's needed. Lower the bar, not the effort — small wins still count.",
    lowMood: "Energy is there, but the mood isn't matching it yet. A short walk or fresh air can shift more than you'd expect.",
    lowEnergy: "Mood's solid, energy's lagging. Consider what your body actually needs today — rest, food, or movement.",
    balanced: "Steady day ahead. A good day to maintain your habits, not necessarily push them.",
    strongBoth: "Mood and energy are both up — a great day to tackle something that matters."
  };

  function checkIn() {
    const result = document.getElementById('result');
    const message = document.getElementById('message');

    if (moodValue === null || energyValue === null) {
      message.textContent = "Select both your mood and energy above to log today's check-in.";
      result.classList.add('visible');
      return;
    }

    let msg;
    if (moodValue <= 2 && energyValue <= 2) {
      msg = messages.lowBoth;
    } else if (moodValue <= 2 && energyValue > 2) {
      msg = messages.lowMood;
    } else if (moodValue > 2 && energyValue <= 2) {
      msg = messages.lowEnergy;
    } else if (moodValue >= 4 && energyValue >= 4) {
      msg = messages.strongBoth;
    } else {
      msg = messages.balanced;
    }

    message.textContent = msg;
    result.classList.add('visible');
  }
</script>

</body>
</html>
