<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Progress Trend</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    margin: 0;
    padding: 24px 16px;
    background: #ffffff;
    display: flex;
    justify-content: center;
  }
  .card {
    width: 100%;
    max-width: 540px;
    border: 1px solid #d1d5db;
    border-radius: 12px;
    padding: 28px 24px;
    background: #ffffff;
  }
  .eyebrow {
    color: #16a34a;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin: 0 0 6px 0;
  }
  h1 {
    font-size: 22px;
    font-weight: 700;
    color: #111827;
    margin: 0 0 8px 0;
  }
  .subtitle {
    font-size: 14px;
    color: #4b5563;
    line-height: 1.5;
    margin: 0 0 20px 0;
  }
  .section-label {
    font-size: 12px;
    font-weight: 700;
    color: #16a34a;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin: 20px 0 10px 0;
  }
  .section-label.first { margin-top: 0; }

  .input-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #111827;
    margin-bottom: 6px;
  }
  input[type="number"] {
    width: 100%;
    padding: 9px 10px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 13px;
    color: #111827;
  }
  input:focus {
    outline: none;
    border-color: #16a34a;
    box-shadow: 0 0 0 3px rgba(22,163,74,0.15);
  }

  button.compare-btn {
    width: 100%;
    margin-top: 20px;
    padding: 13px;
    background: #16a34a;
    color: #ffffff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  button.compare-btn:hover { background: #128a3e; }

  .result {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid #e5e7eb;
    display: none;
  }
  .result.visible { display: block; }
  .metric-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid #f3f4f6;
  }
  .metric-row:last-child { border-bottom: none; }
  .metric-name {
    font-size: 13px;
    font-weight: 600;
    color: #111827;
    flex: 1;
  }
  .metric-values {
    font-size: 13px;
    color: #6b7280;
    text-align: right;
  }
  .metric-delta {
    font-size: 13px;
    font-weight: 700;
    min-width: 50px;
    text-align: right;
  }
  .delta-up { color: #16a34a; }
  .delta-down { color: #dc2626; }
  .delta-flat { color: #6b7280; }

  .message {
    font-size: 13px;
    color: #374151;
    background: #f0fdf4;
    border: 1px solid #bbf7d0;
    border-radius: 8px;
    padding: 12px 14px;
    margin-top: 16px;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div class="card">
  <p class="eyebrow">Plant Powered Performance World</p>
  <h1>Weekly Progress Trend</h1>
  <p class="subtitle">Enter this week's and last week's numbers to see how things moved.</p>

  <p class="section-label first">Last Week</p>
  <div class="input-grid">
    <div><label>Weight (kg)</label><input type="number" id="lastWeight" step="0.1"></div>
    <div><label>Energy (1-10)</label><input type="number" id="lastEnergy" min="1" max="10"></div>
    <div><label>Mood (1-10)</label><input type="number" id="lastMood" min="1" max="10"></div>
    <div><label>Cravings (1-10)</label><input type="number" id="lastCravings" min="1" max="10"></div>
  </div>

  <p class="section-label">This Week</p>
  <div class="input-grid">
    <div><label>Weight (kg)</label><input type="number" id="thisWeight" step="0.1"></div>
    <div><label>Energy (1-10)</label><input type="number" id="thisEnergy" min="1" max="10"></div>
    <div><label>Mood (1-10)</label><input type="number" id="thisMood" min="1" max="10"></div>
    <div><label>Cravings (1-10)</label><input type="number" id="thisCravings" min="1" max="10"></div>
  </div>

  <button class="compare-btn" onclick="compareWeeks()">Compare My Weeks</button>

  <div class="result" id="result">
    <div id="metricsList"></div>
    <div class="message" id="message"></div>
  </div>
</div>

<script>
  function compareWeeks() {
    const metrics = [
      { name: 'Weight', last: 'lastWeight', current: 'thisWeight', unit: 'kg', lowerIsBetter: null },
      { name: 'Energy', last: 'lastEnergy', current: 'thisEnergy', unit: '/10', lowerIsBetter: false },
      { name: 'Mood', last: 'lastMood', current: 'thisMood', unit: '/10', lowerIsBetter: false },
      { name: 'Cravings', last: 'lastCravings', current: 'thisCravings', unit: '/10', lowerIsBetter: true }
    ];

    const metricsList = document.getElementById('metricsList');
    metricsList.innerHTML = '';
    let flags = [];

    metrics.forEach(m => {
      const lastVal = parseFloat(document.getElementById(m.last).value);
      const currentVal = parseFloat(document.getElementById(m.current).value);

      if (isNaN(lastVal) || isNaN(currentVal)) return;

      const delta = Math.round((currentVal - lastVal) * 10) / 10;
      let deltaClass = 'delta-flat';
      let deltaSymbol = '→';

      if (delta > 0) {
        deltaSymbol = '↑ +' + delta;
        deltaClass = (m.lowerIsBetter === true) ? 'delta-down' : (m.lowerIsBetter === false ? 'delta-up' : 'delta-flat');
      } else if (delta < 0) {
        deltaSymbol = '↓ ' + delta;
        deltaClass = (m.lowerIsBetter === true) ? 'delta-up' : (m.lowerIsBetter === false ? 'delta-down' : 'delta-flat');
      } else {
        deltaSymbol = '→ 0';
      }

      const row = document.createElement('div');
      row.className = 'metric-row';
      row.innerHTML = '<span class="metric-name">' + m.name + '</span>' +
        '<span class="metric-values">' + lastVal + m.unit + ' → ' + currentVal + m.unit + '</span>' +
        '<span class="metric-delta ' + deltaClass + '">' + deltaSymbol + '</span>';
      metricsList.appendChild(row);

      if (m.name === 'Cravings' && delta >= 2) flags.push('cravings rose noticeably');
      if (m.name === 'Energy' && delta <= -2) flags.push('energy dropped noticeably');
      if (m.name === 'Mood' && delta <= -2) flags.push('mood dropped noticeably');
    });

    const message = document.getElementById('message');
    if (flags.length > 0) {
      message.textContent = "Worth a closer look: " + flags.join(' and ') + " this week. Check your Adjustments notes in the Weekly Check-In table for what might be behind it.";
    } else {
      message.textContent = "Nothing here jumps out as a red flag. Small week-to-week shifts are normal — the trend across several weeks matters more than any single comparison.";
    }

    document.getElementById('result').classList.add('visible');
  }
</script>

</body>
</html>
